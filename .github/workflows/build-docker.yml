name: Build and push Musubi Tuner Docker images

on:
  workflow_call:
    inputs:
      musubi_ref:
        description: Musubi Tuner branch or tag to build
        required: true
        type: string
      image_label:
        description: Label for the built images
        required: true
        type: string
      extra_image_label:
        description: Optional additional label applied after pushing
        required: false
        type: string
      bake_target:
        description: Optional Docker Bake target or group
        required: false
        type: string
      push_images:
        description: Whether to push the built images
        required: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      DOCKER_REGISTRY_URL: ghcr.io/${{ github.repository_owner }}/
      IMAGE_LABEL: ${{ inputs.image_label }}
      MUSUBI_VERSION: ${{ inputs.musubi_ref }}
      SSH_HOST_ED25519_KEY_B64: ${{ secrets.SSH_HOST_ED25519_KEY_B64 }}
    steps:
      - uses: actions/checkout@v6

      - name: Build images
        uses: ./.github/actions/bake-build
        with:
          musubi_ref: ${{ inputs.musubi_ref }}
          targets: ${{ inputs.bake_target || 'default' }}
          push: ${{ inputs.push_images && 'true' || 'false' }}
          registry: ${{ env.REGISTRY }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  tag-extra-label:
    needs: build
    if: ${{ inputs.push_images && inputs.extra_image_label != '' && inputs.bake_target == '' }}
    uses: ./.github/workflows/tag-images.yml
    with:
      source_label: ${{ inputs.image_label }}
      target_label: ${{ inputs.extra_image_label }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
