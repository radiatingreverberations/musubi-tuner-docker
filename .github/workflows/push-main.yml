name: Build Musubi Tuner images on main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  get-musubi-latest-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Get latest release
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(bash .github/scripts/resolve-musubi-latest-release.sh)
          echo "Latest Musubi Tuner release: $tag"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"

  build-musubi-main:
    concurrency:
      group: build-main
      cancel-in-progress: true
    uses: ./.github/workflows/build-docker.yml
    with:
      musubi_ref: main
      image_label: main
      push_images: true
    permissions:
      contents: read
      packages: write
    secrets: inherit

  build-musubi-latest-release:
    needs: get-musubi-latest-release
    concurrency:
      group: build-latest
      cancel-in-progress: true
    uses: ./.github/workflows/build-docker.yml
    with:
      musubi_ref: ${{ needs.get-musubi-latest-release.outputs.tag }}
      image_label: latest
      extra_image_label: ${{ needs.get-musubi-latest-release.outputs.tag }}
      push_images: true
    permissions:
      contents: read
      packages: write
    secrets: inherit
