name: Build Musubi Tuner images on pull requests

on:
  pull_request:
    branches: [main]

jobs:
  build-pull-request:
    uses: ./.github/workflows/build-docker.yml
    with:
      musubi_ref: main
      image_label: main
      push_images: false
    permissions:
      contents: read
      packages: read
    secrets: inherit
