name: Rebuild on Musubi Tuner latest release changes

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  get-musubi-latest-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Get latest release
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(bash .github/scripts/resolve-musubi-latest-release.sh)
          echo "Latest Musubi Tuner release: $tag"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"

  check-musubi-latest:
    needs: get-musubi-latest-release
    uses: ./.github/workflows/check-musubi.yml
    with:
      musubi_ref: ${{ needs.get-musubi-latest-release.outputs.tag }}
      image_label: latest
      extra_image_label: ${{ needs.get-musubi-latest-release.outputs.tag }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
