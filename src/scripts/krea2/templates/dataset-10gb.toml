# Experimental Krea2 character-LoRA dataset for a 10 GB GPU.

[general]
resolution = [640, 640]
caption_extension = ".txt"
batch_size = 1
enable_bucket = true
bucket_no_upscale = true

[[datasets]]
image_directory = "__MUSUBI_HOME__/dataset/krea2/images"
cache_directory = "__MUSUBI_HOME__/dataset/krea2/cache-10gb"
num_repeats = 1
