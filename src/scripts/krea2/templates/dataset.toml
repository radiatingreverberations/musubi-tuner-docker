# Krea2 character-LoRA image dataset.
# Put every image beside a same-basename .txt caption in the images directory.

[general]
resolution = [1024, 1024]
caption_extension = ".txt"
batch_size = 1
enable_bucket = true
bucket_no_upscale = false

[[datasets]]
image_directory = "__MUSUBI_HOME__/dataset/krea2/images"
cache_directory = "__MUSUBI_HOME__/dataset/krea2/cache"
num_repeats = 1

# Optional regularization dataset. Add it only if the first run binds incidental
# backgrounds or wardrobe too strongly. Regularization captions should use the
