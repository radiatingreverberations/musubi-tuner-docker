# Default attention-only Krea2 character LoRA for a GPU with 32 GB VRAM.
# The narrower target set supports an extended search while preserving prompt control.

# Models and data
dit = "__MUSUBI_HOME__/models/krea2/raw.safetensors"
turbo_dit = "__MUSUBI_HOME__/models/krea2/turbo.safetensors"
vae = "__MUSUBI_HOME__/models/vae/qwen_image_vae.safetensors"
text_encoder = "__MUSUBI_HOME__/models/text_encoders/qwen3vl_4b_bf16.safetensors"
dataset_config = "__MUSUBI_HOME__/dataset/krea2/dataset.toml"

# Precision and memory
mixed_precision = "bf16"
fp8_base = true
fp8_scaled = true
gradient_checkpointing = true
sdpa = true

# Resolution-aware Krea2 flow-matching schedule
timestep_sampling = "krea2_shift"
weighting_scheme = "none"

# LoRA network: attention projections only
network_module = "networks.lora_krea2"
network_dim = 64
network_alpha = 64
network_args = ["exclude_patterns=['.*\\.mlp\\..*','first','last\\.linear','tmlp\\..*','txtmlp\\..*','tproj\\.1','txtfusion\\..*']"]

# Optimizer
optimizer_type = "adamw8bit"
optimizer_args = ["weight_decay=0.0001"]
learning_rate = 0.00005
lr_scheduler = "constant"
lr_warmup_steps = 0
max_grad_norm = 1.0

# Extended checkpoint-search horizon
max_train_steps = 8000
gradient_accumulation_steps = 1

# Checkpoints and resumable state
save_every_n_steps = 400
save_state = true
save_state_on_train_end = true
save_last_n_steps_state = 800

# Fixed Turbo previews. Turbo sampling cannot be combined with blocks_to_swap.
sample_prompts = "__MUSUBI_HOME__/dataset/krea2/samples.txt"
sample_every_n_steps = 400
sample_at_first = true

# Data loading and reproducibility
max_data_loader_n_workers = 2
persistent_data_loader_workers = true
seed = 42

# Output and logging
output_dir = "__MUSUBI_HOME__/output/krea2-character"
output_name = "krea2-character-lora"
logging_dir = "__MUSUBI_HOME__/output/krea2-character/logs"
log_with = "tensorboard"
log_config = true

metadata_title = "Krea2 character likeness LoRA"
metadata_description = "Balanced rank-64 character likeness LoRA trained on Krea2 attention projections."
metadata_tags = "krea2,character,likeness,lora,attention,32gb"
