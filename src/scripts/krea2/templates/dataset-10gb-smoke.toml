# Experimental Krea2 smoke-test dataset for a 10 GB GPU.

[general]
resolution = [512, 512]
caption_extension = ".txt"
batch_size = 1
enable_bucket = true
bucket_no_upscale = true

[[datasets]]
image_directory = "__MUSUBI_HOME__/dataset/krea2/images"
cache_directory = "__MUSUBI_HOME__/dataset/krea2/cache-10gb-smoke"
num_repeats = 1
