# Experimental 512px/rank-8/30-step Krea2 smoke test for a 10 GB GPU.
# Training-time sampling is disabled because Turbo cannot use block swapping.

# Models and data
dit = "__MUSUBI_HOME__/models/krea2/raw.safetensors"
vae = "__MUSUBI_HOME__/models/vae/qwen_image_vae.safetensors"
dataset_config = "__MUSUBI_HOME__/dataset/krea2/dataset-10gb-smoke.toml"

# Precision and aggressive memory reduction
mixed_precision = "bf16"
fp8_base = true
fp8_scaled = true
gradient_checkpointing = true
sdpa = true
blocks_to_swap = 26
block_swap_h2d_only = true
block_swap_ring_size = 1

# Resolution-aware Krea2 flow-matching schedule
timestep_sampling = "krea2_shift"
weighting_scheme = "none"

# Attention-only LoRA targets reduce gradients and optimizer state.
network_module = "networks.lora_krea2"
network_dim = 8
network_alpha = 8
network_args = ["exclude_patterns=['.*\\.mlp\\..*','first','last\\.linear','tmlp\\..*','txtmlp\\..*','tproj\\.1','txtfusion\\..*']"]

# Optimizer
optimizer_type = "adamw8bit"
optimizer_args = ["weight_decay=0.0001"]
learning_rate = 0.0001
lr_scheduler = "constant"
lr_warmup_steps = 0
max_grad_norm = 1.0

# Short smoke test
max_train_steps = 30
gradient_accumulation_steps = 1
save_model_as = "safetensors"
save_every_n_steps = 10
save_last_n_steps = 40

# Data loading and reproducibility
max_data_loader_n_workers = 0
seed = 42

# Output and logging
output_dir = "__MUSUBI_HOME__/output/krea2-character/10gb-smoke"
output_name = "krea2-character-lora-10gb-smoke"
logging_dir = "__MUSUBI_HOME__/output/krea2-character/10gb-smoke/logs"
log_with = "tensorboard"
log_config = true

metadata_title = "Krea2 character LoRA 10 GB smoke test"
metadata_description = "Experimental low-VRAM Krea-2-Raw LoRA smoke test."
metadata_tags = "krea2,character,lora,low-vram,smoke-test"
